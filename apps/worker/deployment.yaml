apiVersion: apps/v1
kind: Deployment
metadata:
  name: scapper-worker
  namespace: smap
  labels:
    app: scapper-worker
    app.kubernetes.io/part-of: smap
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: scapper-worker
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: scapper-worker
        app.kubernetes.io/part-of: smap
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: scapper-worker
          image: registry.tantai.dev/smap/scapper:260310-122750
          imagePullPolicy: IfNotPresent
          # Override CMD to run standalone worker (consumes all 3 platform queues)
          command: ["python", "worker.py", "tiktok", "facebook", "youtube"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          envFrom:
            - configMapRef:
                name: scapper-config
            - secretRef:
                name: scapper-secrets
          env:
            - name: CONTAINER_NAME
              value: "scapper-worker"
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
      terminationGracePeriodSeconds: 30
