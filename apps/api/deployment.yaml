apiVersion: apps/v1
kind: Deployment
metadata:
  name: scapper-api
  namespace: smap
  labels:
    app: scapper-api
    app.kubernetes.io/part-of: smap
    app.kubernetes.io/component: api
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: scapper-api
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: scapper-api
        app.kubernetes.io/part-of: smap
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: scapper-api
          image: registry.tantai.dev/smap/scapper:260316-235109
          imagePullPolicy: IfNotPresent
          command: ["python", "run_api.py"]
          ports:
            - containerPort: 8105
              name: http
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          envFrom:
            - configMapRef:
                name: scapper-config
            - secretRef:
                name: scapper-secrets
          env:
            - name: CONTAINER_NAME
              value: "scapper-api"
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          livenessProbe:
            httpGet:
              path: /health
              port: 8105
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 8105
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: 8105
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 12
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: scapper-api
  namespace: smap
  labels:
    app: scapper-api
    app.kubernetes.io/part-of: smap
spec:
  selector:
    app: scapper-api
  ports:
    - port: 80
      targetPort: 8105
      protocol: TCP
      name: http
  type: ClusterIP
  sessionAffinity: None
